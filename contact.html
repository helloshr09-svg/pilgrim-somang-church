<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문의 — 필그림소망교회</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: 'Noto Serif KR', serif;
        background-color: #f5f0e8;
        color: #333333;
      }

      header {
        background-color: #2c3e6b;
        padding: 16px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .church-title { color: #ffffff; font-size: 20px; font-weight: 700; }
      .church-title span {
        display: block; font-size: 11px;
        color: #aabbdd; font-weight: 400; margin-top: 2px;
      }

      nav a {
        color: #ccddff; text-decoration: none;
        margin-left: 28px; font-size: 14px;
      }
      nav a:hover { color: #ffffff; }

      main {
        max-width: 700px;
        margin: 40px auto;
        background-color: #ffffff;
        padding: 40px 50px;
        border-radius: 8px;
      }

      h2 {
        font-size: 18px; color: #2c3e6b;
        border-left: 4px solid #2c3e6b;
        padding-left: 12px;
        margin-bottom: 24px;
      }

      .info-table {
        width: 100%;
        border-collapse: collapse;
      }

      .info-table tr td {
        padding: 12px 0;
        font-size: 15px;
        color: #555;
        border-bottom: 1px solid #f0ece4;
        vertical-align: middle;
      }

      .info-table tr:last-child td {
        border-bottom: none;
      }

      .info-table td.label {
        color: #999;
        font-size: 13px;
        width: 90px;
      }

      .info-table a {
        color: #555;
        text-decoration: none;
      }

      .info-table a:hover {
        text-decoration: underline;
      }

      .youtube-link {
        color: #c00 !important;
      }

      .bug-report {
        margin-top: 28px;
        padding-top: 20px;
        border-top: 1px solid #eee;
        font-size: 13px;
        color: #bbb;
      }

      .bug-report a {
        color: #bbb;
        text-decoration: none;
      }

      .bug-report a:hover {
        text-decoration: underline;
      }

      footer {
        background-color: #2c3e6b;
        color: #e8eef8;
        text-align: center;
        padding: 30px 20px;
        font-size: 13px;
        line-height: 2;
      }

      footer p { color: #e8eef8; }

      /* 모바일 */
      @media (max-width: 600px) {
        header {
          padding: 12px 20px;
          flex-direction: column;
          align-items: center;
          gap: 10px;
          text-align: center;
        }

        .header-left {
          justify-content: center;
          gap: 10px;
        }

        .church-title {
          font-size: 16px;
          text-align: left;
        }

        nav {
          width: 100%;
          display: flex;
          justify-content: space-around;
          border-top: 1px solid #3a5080;
          padding-top: 10px;
        }

        nav a {
          margin-left: 0;
          font-size: 13px;
        }

        .banner h1 { font-size: 24px; }
        .banner p { font-size: 14px; }

        main {
          margin: 20px 16px;
          padding: 30px 24px;
        }

        h2 { font-size: 16px; }
        p { font-size: 14px; }
        ul { font-size: 14px; }

        .acc-btn { font-size: 14px; }
      }
    </style>
  </head>

        </tr>
        <tr>
          <td class="label">운영시간</td>
          <td>월 — 일 &nbsp; 오전 10:00 ~ 오후 5:00</td>
        </tr>
        <tr>

        </tr>
      </table>

        <a href="mailto:helloshr09@gmail.com">helloshr09@gmail.com</a>
      </div>
    </main>

    <footer>
      <p>대한예수교장로회 필그림소망교회</p>

      <p>© 2025 Pilgrim Somang Church. All rights reserved.</p>
      <p style="margin-top: 12px; font-size: 11px; color: #6688aa;">Designed by harang</p>
    </footer>

  </body>
</html>
