<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오시는 길 — 필그림소망교회</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: 'Noto Serif KR', serif;
        background-color: #f5f0e8;
        color: #333333;
      }

      header {
        background-color: #2c3e6b;
        padding: 16px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .church-title { color: #ffffff; font-size: 20px; font-weight: 700; }
      .church-title span {
        display: block; font-size: 11px;
        color: #aabbdd; font-weight: 400; margin-top: 2px;
      }

      nav a {
        color: #ccddff; text-decoration: none;
        margin-left: 28px; font-size: 14px;
      }
      nav a:hover { color: #ffffff; }

      main {
        max-width: 700px;
        margin: 40px auto;
        background-color: #ffffff;
        padding: 50px;
        border-radius: 8px;
      }

      h2 {
        font-size: 18px; color: #2c3e6b;
        border-left: 4px solid #2c3e6b;
        padding-left: 12px;
        margin-bottom: 16px;
      }

      p { font-size: 15px; line-height: 1.8; color: #555555; margin: 4px 0; }

      .map-wrap {
        margin-top: 16px;
        border-radius: 8px;
        overflow: hidden;
        border: 0.5px solid #ddd;
      }

      footer {
        background-color: #2c3e6b;
        color: #e8eef8;
        text-align: center;
        padding: 30px 20px;
        font-size: 13px;
        line-height: 2;
      }

      footer p {
        color: #e8eef8;
      }

      /* 모바일 */
      @media (max-width: 600px) {
        header {
          padding: 12px 20px;
          flex-direction: row;
          flex-wrap: wrap;
          justify-content: space-between;
          align-items: center;
          gap: 6px;
          text-align: left;
        }

        .header-left {
          gap: 10px;
        }

        .church-title {
          font-size: 16px;
        }

        nav {
          width: 100%;
          display: flex;
          justify-content: space-around;
          border-top: 1px solid #3a5080;
          padding-top: 10px;
          margin-top: 4px;
        }

        nav a {
          margin-left: 0;
          font-size: 13px;
        }

        .banner h1 { font-size: 24px; }
        .banner p { font-size: 14px; }

        main {
          margin: 20px 16px;
          padding: 30px 24px;
        }

        h2 { font-size: 16px; }
        p { font-size: 14px; }
        ul { font-size: 14px; }

        .acc-btn { font-size: 14px; }
      }
    </style>
  </head>

  <body>

    <header>
      <div class="header-left">
        <img src="logo.svg" alt="대한예수교장로회 합동" height="50">
        <div class="church-title">
          필그림소망교회
          <span>Pilgrim Somang Church</span>
        </div>
      </div>
      <nav>
        <a href="index.html">예배 안내</a>
        <a href="location.html">오시는 길</a>
        <a href="#">문의</a>
      </nav>
    </header>

    <main>
      <h2>오시는 길</h2>
      <p>📍 경기도 용인시 기흥구 농서로 10-7</p>

      <div class="map-wrap">
        <div id="daumRoughmapContainer1778408669394" class="root_daum_roughmap root_daum_roughmap_landing"></div>
        <script charset="UTF-8" class="daum_roughmap_loader_script" src="https://ssl.daumcdn.net/dmaps/map_js_init/roughmapLoader.js"></script>
        <script charset="UTF-8">
          new daum.roughmap.Lander({
            "timestamp" : "1778408669394",
            "key" : "nj4r8dx72bn",
            "mapWidth" : "640",
            "mapHeight" : "360"
          }).render();
        </script>
      </div>
      <p style="margin-top: 10px; font-size: 13px; color: #888;">
        📍 지도를 클릭하면 카카오맵에서 길찾기를 할 수 있어요.
      </p>
    </main>

    <footer>
      <p>대한예수교장로회 필그림소망교회</p>
      <p>경기도 용인시 기흥구 농서로 10-7 | TEL: (031) 286-0691</p>
      <p>© 2025 Pilgrim Somang Church. All rights reserved.</p>
      <p style="margin-top: 12px; font-size: 11px; color: #6688aa;">Designed by harang</p>
    </footer>

  </body>
</html>
